<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="5×5">
<meta name="theme-color" content="#ffffff">
<title>5×5 강함</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700;800&family=DM+Mono:wght@500&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/lucide@latest/dist/umd/lucide.min.js"></script>
<script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.x.x/dist/cdn.min.js"></script>
<style>
  :root {
    --bg:#f7f7f5; --surface:#ffffff; --surface2:#f2f2ef; --border:#e8e8e4; --border2:#d4d4ce;
    --text:#1a1a18; --text2:#6b6b65; --text3:#b0b0a8;
    --squat:#e8480a; --bench:#1a6ef5; --dead:#7c3aed;
    --success:#16a34a; --danger:#dc2626; --warn:#d97706;
    --radius:16px; --radius-sm:10px;
    --safe-top:env(safe-area-inset-top,0px); --safe-bot:env(safe-area-inset-bottom,0px);
    --font:'DM Sans',sans-serif; --mono:'DM Mono',monospace;
  }
  *{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
  html{background:var(--bg);}
  body{background:var(--bg);color:var(--text);font-family:var(--font);min-height:100dvh;overflow-x:hidden;-webkit-font-smoothing:antialiased;}

  .header{position:sticky;top:0;z-index:100;background:rgba(247,247,245,0.92);backdrop-filter:blur(12px);-webkit-backdrop-filter:blur(12px);border-bottom:1px solid var(--border);padding:calc(12px + var(--safe-top)) 20px 12px;display:flex;align-items:center;justify-content:space-between;}
  .header-logo{display:flex;align-items:center;gap:8px;}
  .header-dot{width:7px;height:7px;border-radius:50%;background:var(--squat);flex-shrink:0;}
  .header-title{font-size:20px;font-weight:800;letter-spacing:-0.5px;}
  .header-sub{font-size:11px;color:var(--text3);letter-spacing:0.3px;text-transform:uppercase;font-weight:500;}
  .btn-icon{width:38px;height:38px;border-radius:50%;background:var(--surface);border:1px solid var(--border);color:var(--text2);cursor:pointer;display:flex;align-items:center;justify-content:center;transition:background 0.15s;}
  .btn-icon:active{background:var(--surface2);}

  .nav{position:fixed;bottom:0;left:0;right:0;z-index:100;background:rgba(247,247,245,0.95);backdrop-filter:blur(12px);-webkit-backdrop-filter:blur(12px);border-top:1px solid var(--border);display:flex;padding-bottom:var(--safe-bot);}
  .nav-btn{flex:1;padding:10px 0 8px;background:none;border:none;color:var(--text3);font-size:10px;font-family:var(--font);font-weight:500;display:flex;flex-direction:column;align-items:center;gap:4px;cursor:pointer;transition:color 0.15s;}
  .nav-btn.active{color:var(--text);}

  .page{display:none;padding:0 0 88px;}
  .page.active{display:block;}

  /* READY */
  .ready-screen{padding:24px 20px;}
  .ready-eyebrow{font-size:11px;font-weight:600;color:var(--text3);text-transform:uppercase;letter-spacing:0.8px;margin-bottom:6px;}
  .ready-heading{font-size:34px;font-weight:800;letter-spacing:-1px;color:var(--text);margin-bottom:24px;line-height:1.1;}
  .ready-heading span{color:var(--text3);}
  .last-hint{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:14px 16px;margin-bottom:16px;}
  .last-hint-label{font-size:10px;font-weight:700;color:var(--text3);text-transform:uppercase;letter-spacing:0.6px;margin-bottom:10px;}
  .last-hint-chips{display:flex;gap:8px;flex-wrap:wrap;}
  .lhchip{font-size:12px;font-weight:500;color:var(--text2);display:flex;align-items:center;gap:5px;}
  .lhchip strong{color:var(--text);font-weight:700;}
  .ready-lifts{display:flex;flex-direction:column;gap:10px;margin-bottom:24px;}
  .ready-lift-row{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:16px;display:flex;align-items:center;justify-content:space-between;}
  .rl-left{display:flex;align-items:center;gap:12px;}
  .lift-pill{width:36px;height:36px;border-radius:10px;display:flex;align-items:center;justify-content:center;flex-shrink:0;}
  .rl-name{font-size:15px;font-weight:700;}
  .rl-sets{font-size:12px;color:var(--text3);margin-top:1px;font-weight:500;}
  .rl-weight{font-family:var(--mono);font-size:20px;font-weight:500;}
  .rl-unit{font-size:12px;color:var(--text3);}
  .fail-badge{font-size:10px;font-weight:700;padding:2px 8px;border-radius:20px;margin-top:4px;display:inline-block;}
  .fail-badge.f1{background:#fef3c7;color:var(--warn);}
  .fail-badge.f2{background:#fee2e2;color:var(--danger);}
  .btn-start{width:100%;padding:18px;background:var(--text);border:none;border-radius:var(--radius);color:var(--bg);font-size:16px;font-weight:700;font-family:var(--font);cursor:pointer;display:flex;align-items:center;justify-content:center;gap:8px;transition:opacity 0.15s;}
  .btn-start:active{opacity:0.8;}

  /* ACTIVE */
  .workout-topbar{padding:14px 20px 8px;display:flex;align-items:center;justify-content:space-between;}
  .topbar-date{font-size:13px;color:var(--text2);font-weight:500;}
  .topbar-badge{font-size:11px;font-weight:700;color:var(--text2);background:var(--surface);border:1px solid var(--border);border-radius:20px;padding:4px 10px;}
  .progress-wrap{padding:0 20px 16px;display:flex;align-items:center;gap:12px;}
  .progress-bar{flex:1;height:3px;background:var(--border);border-radius:2px;overflow:hidden;}
  .progress-fill{height:100%;border-radius:2px;background:var(--text);transition:width 0.3s;}
  .progress-label{font-size:11px;color:var(--text3);font-family:var(--mono);min-width:36px;text-align:right;}

  .lift-card{margin:0 16px 12px;background:var(--surface);border:1.5px solid var(--border);border-radius:var(--radius);overflow:hidden;transition:border-color 0.2s;}
  .lift-card.state-success{border-color:var(--success);}
  .lift-card.state-fail{border-color:var(--danger);}
  .lift-card-header{padding:14px 16px 12px;display:flex;align-items:center;justify-content:space-between;}
  .lc-left{display:flex;align-items:center;gap:10px;}
  .lc-pill{width:32px;height:32px;border-radius:9px;display:flex;align-items:center;justify-content:center;flex-shrink:0;}
  .lc-name{font-size:16px;font-weight:700;}
  .lc-tag{font-size:10px;font-weight:700;padding:2px 7px;border-radius:6px;margin-left:6px;letter-spacing:0.3px;}
  .weight-ctrl{display:flex;align-items:center;gap:10px;}
  .wbtn{width:32px;height:32px;border-radius:8px;background:var(--surface2);border:1px solid var(--border);color:var(--text);font-size:18px;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:background 0.1s;}
  .wbtn:active{background:var(--border);}
  .wval{font-family:var(--mono);font-size:20px;font-weight:500;min-width:64px;text-align:center;color:var(--text);}
  .wunit{font-size:11px;color:var(--text3);font-family:var(--font);font-weight:500;}

  .sets-row{padding:0 16px 12px;display:flex;gap:6px;}
  .set-btn{flex:1;height:46px;border-radius:var(--radius-sm);border:1.5px solid var(--border);background:var(--surface2);color:var(--text3);cursor:pointer;display:flex;align-items:center;justify-content:center;flex-direction:column;gap:2px;font-family:var(--font);font-weight:600;font-size:13px;transition:all 0.15s;}
  .set-btn.done{background:var(--surface);border-color:currentColor;}
  .set-btn.locked{cursor:not-allowed;opacity:0.35;}
  .set-btn.single{flex:none;width:80px;height:50px;}
  .set-num{font-size:9px;font-weight:600;opacity:0.6;text-transform:uppercase;letter-spacing:0.3px;}
  .card-divider{height:1px;background:var(--border);margin:0 16px;}

  .result-row{padding:12px 16px;display:flex;gap:8px;}
  .result-btn{flex:1;padding:11px 8px;border-radius:var(--radius-sm);border:1.5px solid var(--border);background:transparent;font-size:13px;font-weight:700;font-family:var(--font);cursor:pointer;transition:all 0.15s;display:flex;align-items:center;justify-content:center;gap:6px;}
  .result-btn.success-btn{color:var(--success);}
  .result-btn.fail-btn{color:var(--danger);}
  .result-btn.selected-success{background:#f0fdf4;border-color:var(--success);color:var(--success);}
  .result-btn.selected-fail{background:#fef2f2;border-color:var(--danger);color:var(--danger);}
  .result-btn:active{transform:scale(0.96);}

  .save-bar{padding:8px 16px 4px;}
  .btn-save{width:100%;padding:16px;border-radius:var(--radius);border:1.5px solid var(--border);background:var(--surface2);color:var(--text3);font-size:14px;font-weight:700;font-family:var(--font);cursor:not-allowed;transition:all 0.2s;display:flex;align-items:center;justify-content:center;gap:8px;}
  .btn-save.ready{background:var(--text);border-color:var(--text);color:#fff;cursor:pointer;}
  .btn-save.ready:active{opacity:0.85;}

  /* SHEET */
  .overlay{display:none;position:fixed;inset:0;z-index:200;background:rgba(26,26,24,0.4);backdrop-filter:blur(4px);-webkit-backdrop-filter:blur(4px);align-items:flex-end;justify-content:center;}
  .overlay.show{display:flex;}
  .sheet{background:var(--surface);border-radius:24px 24px 0 0;border-top:1px solid var(--border);padding:8px 20px calc(28px + var(--safe-bot));width:100%;animation:slideUp 0.28s cubic-bezier(0.32,0.72,0,1);max-height:90dvh;overflow-y:auto;}
  @keyframes slideUp{from{transform:translateY(100%);}to{transform:translateY(0);}}
  .sheet-handle{width:36px;height:4px;border-radius:2px;background:var(--border2);margin:12px auto 20px;}
  .sheet-emoji{font-size:40px;text-align:center;margin-bottom:8px;}
  .sheet-title{font-size:22px;font-weight:800;text-align:center;letter-spacing:-0.5px;margin-bottom:4px;}
  .sheet-sub{font-size:13px;color:var(--text2);text-align:center;margin-bottom:20px;line-height:1.5;}
  .deload-alert{background:#fef2f2;border:1px solid #fecaca;border-radius:var(--radius-sm);padding:12px 14px;margin-bottom:16px;font-size:13px;color:var(--danger);line-height:1.6;}
  .result-summary{display:flex;flex-direction:column;gap:8px;margin-bottom:20px;}
  .rs-row{display:flex;align-items:center;justify-content:space-between;background:var(--surface2);border-radius:var(--radius-sm);padding:12px 14px;border:1px solid var(--border);}
  .rs-left{display:flex;align-items:center;gap:10px;font-size:14px;font-weight:700;}
  .rs-pill{width:28px;height:28px;border-radius:8px;display:flex;align-items:center;justify-content:center;flex-shrink:0;}
  .rs-badge{font-size:11px;font-weight:700;padding:2px 8px;border-radius:6px;}
  .rs-badge.ok{background:#f0fdf4;color:var(--success);}
  .rs-badge.fail{background:#fef2f2;color:var(--danger);}
  .rs-right{text-align:right;}
  .rs-cur{font-size:13px;color:var(--text2);font-family:var(--mono);}
  .rs-next{font-size:13px;font-weight:700;font-family:var(--mono);margin-top:2px;}
  .sheet-actions{display:flex;flex-direction:column;gap:10px;}
  .btn-confirm{width:100%;padding:17px;border-radius:var(--radius);background:var(--text);border:none;color:#fff;font-size:15px;font-weight:700;font-family:var(--font);cursor:pointer;display:flex;align-items:center;justify-content:center;gap:8px;}
  .btn-confirm:active{opacity:0.85;}
  .btn-back{width:100%;padding:14px;border-radius:var(--radius);background:transparent;border:1.5px solid var(--border);color:var(--text2);font-size:14px;font-weight:600;font-family:var(--font);cursor:pointer;}

  /* HISTORY */
  .section-title{padding:20px 20px 12px;font-size:11px;font-weight:700;color:var(--text3);text-transform:uppercase;letter-spacing:0.8px;}
  .empty{padding:60px 20px;text-align:center;color:var(--text3);font-size:15px;}
  .hist-item{margin:0 16px 10px;background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:14px 16px;}
  .hist-header{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:12px;}
  .hist-date{font-size:13px;color:var(--text2);font-weight:500;}
  .hist-num{font-size:11px;font-weight:700;color:var(--text3);margin-top:2px;}
  .hist-lifts{display:flex;gap:8px;flex-wrap:wrap;}
  .hchip{display:flex;align-items:center;gap:6px;background:var(--surface2);border:1px solid var(--border);border-radius:8px;padding:5px 10px;font-size:12px;}
  .hchip-dot{width:7px;height:7px;border-radius:50%;flex-shrink:0;}
  .hchip-name{color:var(--text2);font-weight:500;}
  .hchip-w{font-weight:700;color:var(--text);font-family:var(--mono);}
  .hchip-r{font-size:11px;font-weight:700;margin-left:1px;}
  .hchip-r.ok{color:var(--success);}
  .hchip-r.fail{color:var(--danger);}
  .btn-del{background:none;border:none;color:var(--text3);cursor:pointer;padding:2px 4px;}

  /* STATS */
  .stats-grid{padding:0 16px;display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:16px;}
  .stat-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:16px;}
  .stat-label{font-size:10px;font-weight:700;color:var(--text3);text-transform:uppercase;letter-spacing:0.6px;}
  .stat-val{font-size:30px;font-weight:800;margin-top:6px;line-height:1;letter-spacing:-1px;}
  .stat-sub{font-size:11px;color:var(--text3);margin-top:4px;font-weight:500;}
  .pr-list{padding:0 16px;}
  .pr-item{display:flex;align-items:center;background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:14px 16px;margin-bottom:10px;gap:14px;}
  .pr-pill{width:36px;height:36px;border-radius:10px;display:flex;align-items:center;justify-content:center;flex-shrink:0;}
  .pr-name{flex:1;font-size:15px;font-weight:700;}
  .pr-right{text-align:right;}
  .pr-weight{font-size:22px;font-weight:800;font-family:var(--mono);letter-spacing:-0.5px;}
  .pr-unit{font-size:12px;color:var(--text3);}
  .pr-date{font-size:11px;color:var(--text3);margin-top:2px;}

  /* SETTINGS */
  .settings-section{padding:0 16px;margin-bottom:20px;}
  .srow{display:flex;align-items:center;justify-content:space-between;background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:14px 16px;margin-bottom:8px;}
  .srow-left{display:flex;align-items:center;gap:12px;}
  .slabel{font-size:15px;font-weight:600;}
  .ssub{font-size:11px;color:var(--text3);margin-top:2px;font-weight:500;}
  .winput{background:var(--surface2);border:1.5px solid var(--border);border-radius:9px;color:var(--text);font-size:17px;font-weight:700;font-family:var(--mono);width:80px;text-align:center;padding:7px;}
  .winput:focus{outline:none;border-color:var(--text);}
  .info-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:16px;margin-bottom:8px;}
  .info-title{font-size:14px;font-weight:700;margin-bottom:10px;}
  .info-row{display:flex;align-items:flex-start;gap:10px;font-size:13px;color:var(--text2);padding:5px 0;border-bottom:1px solid var(--border);line-height:1.5;}
  .info-row:last-child{border-bottom:none;}
  .btn-reset{width:100%;padding:14px;background:#fef2f2;border:1px solid #fecaca;border-radius:var(--radius);color:var(--danger);font-size:14px;font-weight:700;font-family:var(--font);cursor:pointer;display:flex;align-items:center;justify-content:center;gap:8px;}

  .toast{position:fixed;bottom:calc(88px + 12px);left:50%;transform:translateX(-50%) translateY(8px);background:var(--text);color:#fff;border-radius:20px;padding:10px 18px;font-size:13px;font-weight:600;font-family:var(--font);opacity:0;transition:all 0.25s;z-index:999;white-space:nowrap;pointer-events:none;display:flex;align-items:center;gap:7px;}
  .toast.show{opacity:1;transform:translateX(-50%) translateY(0);}
</style>
</head>
<body x-data="app()" x-init="init()">

<div class="header">
  <div class="header-logo">
    <div class="header-dot"></div>
    <div>
      <div class="header-title">5×5 강함</div>
      <div class="header-sub">StrongLifts</div>
    </div>
  </div>
  <button class="btn-icon" @click="currentPage='settings'">
    <i data-lucide="settings" style="width:17px;height:17px;stroke:currentColor;"></i>
  </button>
</div>

<!-- WORKOUT PAGE -->
<div class="page" :class="{'active': currentPage==='workout'}">

  <!-- READY -->
  <div class="ready-screen" x-show="!workoutActive">
    <div class="ready-eyebrow">다음 훈련</div>
    <div class="ready-heading">훈련 <span x-text="'#'+(history.length+1)"></span></div>

    <div class="last-hint" x-show="history.length > 0">
      <div class="last-hint-label">지난 훈련</div>
      <div class="last-hint-chips">
        <template x-for="k in LIFTS" :key="k">
          <span class="lhchip">
            <span :style="`width:7px;height:7px;border-radius:50%;background:${COLORS[k]};display:inline-block;`"></span>
            <span x-text="NAMES[k]"></span>
            <strong x-text="history[0].weights[k]+'kg'"></strong>
            <span :style="`color:${history[0].results[k]==='success'?'var(--success)':'var(--danger)'}`"
                  x-text="history[0].results[k]==='success'?'✓':'✕'"></span>
          </span>
        </template>
      </div>
    </div>

    <div class="ready-lifts">
      <template x-for="k in LIFTS" :key="k">
        <div class="ready-lift-row">
          <div class="rl-left">
            <div class="lift-pill" :style="`background:${PILL_BG[k]}`">
              <i :data-lucide="ICONS[k]" :style="`width:18px;height:18px;stroke:${COLORS[k]};`"></i>
            </div>
            <div>
              <div class="rl-name" x-text="NAMES[k]"></div>
              <div class="rl-sets" x-text="k==='dead'?'1×5':'5×5'"></div>
              <span class="fail-badge f1" x-show="fails[k]===1">⚠ 1연속 실패</span>
              <span class="fail-badge f2" x-show="fails[k]===2">⚠ 2연속 — 다음 실패 시 디로드</span>
            </div>
          </div>
          <div style="text-align:right">
            <span class="rl-weight" x-text="weights[k]"></span><span class="rl-unit"> kg</span>
          </div>
        </div>
      </template>
    </div>

    <button class="btn-start" @click="startWorkout()">
      <i data-lucide="dumbbell" style="width:18px;height:18px;stroke:currentColor;"></i>
      훈련 시작
    </button>
  </div>

  <!-- ACTIVE -->
  <div x-show="workoutActive">
    <div class="workout-topbar">
      <span class="topbar-date" x-text="todayStr()"></span>
      <span class="topbar-badge" x-text="'훈련 #'+(history.length+1)"></span>
    </div>
    <div class="progress-wrap">
      <div class="progress-bar">
        <div class="progress-fill" :style="`width:${progressPct()}%`"></div>
      </div>
      <div class="progress-label" x-text="`${totalTapped()} / 11`"></div>
    </div>

    <template x-for="k in LIFTS" :key="k">
      <div class="lift-card"
           :class="{'state-success': chosen[k]==='success', 'state-fail': chosen[k]==='fail'}">
        <div class="lift-card-header">
          <div class="lc-left">
            <div class="lc-pill" :style="`background:${PILL_BG[k]}`">
              <i :data-lucide="ICONS[k]" :style="`width:16px;height:16px;stroke:${COLORS[k]};`"></i>
            </div>
            <div>
              <span class="lc-name" x-text="NAMES[k]"></span>
              <span class="lc-tag" x-show="k==='dead'"
                    style="background:#f5f3ff;color:#7c3aed;">1×5</span>
            </div>
          </div>
          <div class="weight-ctrl">
            <button class="wbtn" @click="changeWeight(k,-1)">−</button>
            <div class="wval"><span x-text="weights[k]"></span><span class="wunit"> kg</span></div>
            <button class="wbtn" @click="changeWeight(k,1)">+</button>
          </div>
        </div>

        <!-- SETS -->
        <div class="sets-row" :style="k==='dead'?'justify-content:center':''">
          <template x-for="i in (k==='dead'?[0]:[0,1,2,3,4])" :key="i">
            <button class="set-btn"
                    :class="{
                      'single': k==='dead',
                      'done': i < tapped[k],
                      'locked': i > tapped[k]
                    }"
                    :style="i < tapped[k] ? `color:${COLORS[k]}` : ''"
                    @click="i === tapped[k] && tapSet(k)">
              <span :style="`font-size:${k==='dead'?'18px':'15px'}`"
                    x-text="i < tapped[k] ? '✓' : '·'"></span>
              <span class="set-num" x-text="k==='dead'?'1SET':`${i+1}SET`"></span>
            </button>
          </template>
        </div>

        <div class="card-divider"></div>

        <!-- RESULT BUTTONS -->
        <div class="result-row">
          <button class="result-btn success-btn"
                  :class="{'selected-success': chosen[k]==='success'}"
                  @click="chosen[k]='success'; saveProgress()">
            <i data-lucide="check-circle" style="width:15px;height:15px;stroke:currentColor;"></i>
            성공
          </button>
          <button class="result-btn fail-btn"
                  :class="{'selected-fail': chosen[k]==='fail'}"
                  @click="chosen[k]='fail'; saveProgress()">
            <i data-lucide="x-circle" style="width:15px;height:15px;stroke:currentColor;"></i>
            실패
          </button>
        </div>
      </div>
    </template>

    <div class="save-bar">
      <button class="btn-save" :class="{'ready': allChosen()}" @click="allChosen() && openSummary()">
        <i :data-lucide="allChosen()?'arrow-right':'circle'"
           style="width:16px;height:16px;stroke:currentColor;"></i>
        <span x-text="allChosen()
          ? '결과 확인 및 저장'
          : LIFTS.filter(k=>!chosen[k]).map(k=>NAMES[k]).join(', ') + ' — 성공/실패 선택해주세요'">
        </span>
      </button>
    </div>
  </div>
</div>

<!-- SUMMARY OVERLAY -->
<div class="overlay" :class="{'show': showSummary}">
  <div class="sheet" x-show="showSummary">
    <div class="sheet-handle"></div>
    <div class="sheet-emoji" x-text="summaryEmoji()"></div>
    <div class="sheet-title" x-text="LIFTS.every(k=>chosen[k]==='success')?'훈련 완료!':'훈련 저장'"></div>
    <div class="sheet-sub"
         x-text="LIFTS.every(k=>chosen[k]==='success')
           ? '모든 종목 성공! 다음 훈련에서 증량해요'
           : '실패 종목은 무게를 유지해요'"></div>

    <div class="deload-alert"
         x-show="LIFTS.some(k=>chosen[k]==='fail'&&(fails[k]||0)+1>=3)">
      <strong>⚠ 디로드 발동</strong><br>
      <span x-text="LIFTS.filter(k=>chosen[k]==='fail'&&(fails[k]||0)+1>=3).map(k=>NAMES[k]).join(', ')"></span>
      — 3연속 실패로 다음 훈련 무게 10% 감량
    </div>

    <div class="result-summary">
      <template x-for="k in LIFTS" :key="k">
        <div class="rs-row">
          <div class="rs-left">
            <div class="rs-pill" :style="`background:${PILL_BG[k]}`">
              <i :data-lucide="ICONS[k]" :style="`width:14px;height:14px;stroke:${COLORS[k]};`"></i>
            </div>
            <span x-text="NAMES[k]"></span>
            <span class="rs-badge" :class="chosen[k]==='success'?'ok':'fail'"
                  x-text="chosen[k]==='success'?'성공':'실패'"></span>
          </div>
          <div class="rs-right">
            <div class="rs-cur" x-text="weights[k]+'kg'"></div>
            <div class="rs-next" :style="`color:${nextColor(k)}`"
                 x-text="`${nextWeight(k)}kg (${nextTag(k)})`"></div>
          </div>
        </div>
      </template>
    </div>

    <div class="sheet-actions">
      <button class="btn-confirm" @click="finishWorkout()">
        <i data-lucide="check" style="width:16px;height:16px;stroke:currentColor;"></i>
        저장하고 다음 훈련 준비
      </button>
      <button class="btn-back" @click="showSummary=false">돌아가기</button>
    </div>
  </div>
</div>

<!-- HISTORY PAGE -->
<div class="page" :class="{'active': currentPage==='history'}">
  <div class="section-title">훈련 기록</div>
  <div x-show="!history.length" class="empty">아직 기록이 없어요 🏋️</div>
  <template x-for="(entry, idx) in history" :key="entry.id">
    <div class="hist-item">
      <div class="hist-header">
        <div>
          <div class="hist-date" x-text="formatDate(entry.date)"></div>
          <div class="hist-num" x-text="'훈련 #'+entry.num"></div>
        </div>
        <button class="btn-del" @click="delEntry(idx)">
          <i data-lucide="trash-2" style="width:16px;height:16px;stroke:currentColor;"></i>
        </button>
      </div>
      <div class="hist-lifts">
        <template x-for="k in LIFTS" :key="k">
          <div class="hchip">
            <span class="hchip-dot" :style="`background:${COLORS[k]}`"></span>
            <span class="hchip-name" x-text="NAMES[k]"></span>
            <span class="hchip-w" x-text="entry.weights[k]+'kg'"></span>
            <span class="hchip-r" :class="entry.results[k]==='success'?'ok':'fail'"
                  x-text="entry.results[k]==='success'?'✓':'✕'"></span>
          </div>
        </template>
      </div>
    </div>
  </template>
</div>

<!-- STATS PAGE -->
<div class="page" :class="{'active': currentPage==='stats'}">
  <div class="section-title">통계</div>
  <div class="stats-grid">
    <div class="stat-card">
      <div class="stat-label">총 훈련</div>
      <div class="stat-val" x-text="history.length"></div>
      <div class="stat-sub">회</div>
    </div>
    <div class="stat-card">
      <div class="stat-label">이번 달</div>
      <div class="stat-val" x-text="thisMonthCount()"></div>
      <div class="stat-sub">회</div>
    </div>
    <div class="stat-card">
      <div class="stat-label">완전 성공률</div>
      <div class="stat-val" style="color:var(--success)" x-text="successRate()+'%'"></div>
      <div class="stat-sub">전체 대비</div>
    </div>
    <div class="stat-card">
      <div class="stat-label">현재 연속 실패</div>
      <div class="stat-val"
           :style="`color:${Math.max(...Object.values(fails))>0?'var(--warn)':'var(--success)'}`"
           x-text="Math.max(...Object.values(fails))"></div>
      <div class="stat-sub">최대</div>
    </div>
  </div>
  <div class="section-title">개인 최고 기록</div>
  <div class="pr-list">
    <template x-for="k in LIFTS" :key="k">
      <div class="pr-item">
        <div class="pr-pill" :style="`background:${PILL_BG[k]}`">
          <i :data-lucide="ICONS[k]" :style="`width:18px;height:18px;stroke:${COLORS[k]};`"></i>
        </div>
        <div class="pr-name" x-text="NAMES[k]"></div>
        <div class="pr-right">
          <div class="pr-weight" x-text="prWeight(k)"><span class="pr-unit"> kg</span></div>
          <div class="pr-date" x-text="prDate(k)"></div>
        </div>
      </div>
    </template>
  </div>
</div>

<!-- SETTINGS PAGE -->
<div class="page" :class="{'active': currentPage==='settings'}">
  <div class="section-title">현재 무게</div>
  <div class="settings-section">
    <template x-for="k in LIFTS" :key="k">
      <div class="srow">
        <div class="srow-left">
          <div class="lc-pill" :style="`background:${PILL_BG[k]}`">
            <i :data-lucide="ICONS[k]" :style="`width:15px;height:15px;stroke:${COLORS[k]};`"></i>
          </div>
          <div>
            <div class="slabel" x-text="NAMES[k]"></div>
            <div class="ssub" x-text="k==='dead'?'+5kg → 이후 +2.5kg':'+2.5kg / 훈련'"></div>
          </div>
        </div>
        <input class="winput" type="number" step="2.5" min="20"
               :value="weights[k]"
               @change="weights[k]=Math.max(20,parseFloat($event.target.value)||20); persist()">
      </div>
    </template>
  </div>
  <div class="section-title">규칙</div>
  <div class="settings-section">
    <div class="info-card">
      <div class="info-title">StrongLifts 5×5 메커니즘</div>
      <div class="info-row"><i data-lucide="check-circle" style="width:15px;height:15px;stroke:var(--success);flex-shrink:0;margin-top:1px;"></i><span>5×5 성공 → 다음 훈련 증량</span></div>
      <div class="info-row"><i data-lucide="x-circle" style="width:15px;height:15px;stroke:var(--danger);flex-shrink:0;margin-top:1px;"></i><span>실패 → 무게 유지</span></div>
      <div class="info-row"><i data-lucide="alert-triangle" style="width:15px;height:15px;stroke:var(--warn);flex-shrink:0;margin-top:1px;"></i><span>3연속 실패 → 현재 무게 10% 감량 (디로드)</span></div>
      <div class="info-row"><i data-lucide="layers" style="width:15px;height:15px;stroke:var(--dead);flex-shrink:0;margin-top:1px;"></i><span>데드리프트는 1세트 × 5회</span></div>
    </div>
    <button class="btn-reset" @click="confirmReset()">
      <i data-lucide="trash-2" style="width:16px;height:16px;stroke:currentColor;"></i>
      모든 기록 초기화
    </button>
  </div>
</div>

<!-- NAV -->
<nav class="nav">
  <template x-for="tab in [{id:'workout',icon:'dumbbell',label:'훈련'},{id:'history',icon:'list',label:'기록'},{id:'stats',icon:'bar-chart-2',label:'통계'},{id:'settings',icon:'settings',label:'설정'}]" :key="tab.id">
    <button class="nav-btn" :class="{'active': currentPage===tab.id}" @click="currentPage=tab.id; $nextTick(()=>lucide.createIcons())">
      <i :data-lucide="tab.icon" style="width:22px;height:22px;stroke:currentColor;"></i>
      <span x-text="tab.label"></span>
    </button>
  </template>
</nav>

<!-- TOAST -->
<div class="toast" :class="{'show': toastVisible}">
  <i data-lucide="check" style="width:14px;height:14px;stroke:currentColor;"></i>
  <span x-text="toastMsg"></span>
</div>

<script>
function app() {
  const LIFTS = ['squat','bench','dead'];
  const NAMES = { squat:'스쿼트', bench:'벤치프레스', dead:'데드리프트' };
  const COLORS = { squat:'#e8480a', bench:'#1a6ef5', dead:'#7c3aed' };
  const PILL_BG = { squat:'#fff3ee', bench:'#eff6ff', dead:'#f5f3ff' };
  const ICONS = { squat:'trending-up', bench:'activity', dead:'zap' };
  const INC = { squat:2.5, bench:2.5, dead:5 };
  const MAX_SETS = { squat:5, bench:5, dead:1 };

  function load() { try { return JSON.parse(localStorage.getItem('fx5_v3'))||{}; } catch { return {}; } }

  const saved = load();

  return {
    // CONSTANTS exposed to template
    LIFTS, NAMES, COLORS, PILL_BG, ICONS,

    // STATE
    currentPage: 'workout',
    weights:     saved.weights  || { squat:60, bench:50, dead:80 },
    fails:       saved.fails    || { squat:0, bench:0, dead:0 },
    history:     saved.history  || [],
    deadBig:     saved.deadBig  !== undefined ? saved.deadBig : true,
    workoutActive: saved.workoutActive || false,

    chosen: saved.inProgress?.chosen || { squat:null, bench:null, dead:null },
    tapped: saved.inProgress?.tapped || { squat:0, bench:0, dead:0 },

    showSummary: false,
    toastVisible: false,
    toastMsg: '',

    // INIT
    init() {
      this.$watch('currentPage', () => this.$nextTick(() => lucide.createIcons()));
      this.$nextTick(() => lucide.createIcons());
    },

    // HELPERS
    round25(v) { return Math.round(v/2.5)*2.5; },
    todayStr() {
      return new Date().toLocaleDateString('ko-KR',{month:'long',day:'numeric',weekday:'short'});
    },
    formatDate(iso) {
      return new Date(iso).toLocaleDateString('ko-KR',{year:'numeric',month:'long',day:'numeric',weekday:'short'});
    },
    persist() {
      localStorage.setItem('fx5_v3', JSON.stringify({
        weights: this.weights, fails: this.fails, history: this.history,
        deadBig: this.deadBig, workoutActive: this.workoutActive,
        inProgress: { chosen: this.chosen, tapped: this.tapped }
      }));
    },

    // PROGRESS
    totalTapped() { return this.tapped.squat + this.tapped.bench + this.tapped.dead; },
    progressPct() { return Math.round(this.totalTapped() / 11 * 100); },
    allChosen() { return LIFTS.every(k => this.chosen[k] !== null); },

    // WORKOUT
    startWorkout() {
      this.workoutActive = true;
      this.chosen = { squat:null, bench:null, dead:null };
      this.tapped = { squat:0, bench:0, dead:0 };
      this.persist();
      this.$nextTick(() => lucide.createIcons());
    },
    tapSet(k) {
      if (this.tapped[k] < MAX_SETS[k]) {
        this.tapped[k]++;
        this.saveProgress();
      }
    },
    saveProgress() { this.persist(); },
    changeWeight(k, dir) {
      const inc = k==='dead' ? (this.deadBig?5:2.5) : INC[k];
      this.weights[k] = Math.max(20, this.round25(this.weights[k] + dir * inc));
      this.persist();
    },

    // SUMMARY
    nextWeight(k) {
      if (this.chosen[k]==='success') {
        const inc = k==='dead'?(this.deadBig?5:2.5):INC[k];
        return this.round25(this.weights[k] + inc);
      }
      if ((this.fails[k]||0)+1 >= 3) return this.round25(this.weights[k]*0.9);
      return this.weights[k];
    },
    nextTag(k) {
      if (this.chosen[k]==='success') { const inc=k==='dead'?(this.deadBig?5:2.5):INC[k]; return `+${inc}kg`; }
      if ((this.fails[k]||0)+1 >= 3) return '−10% 디로드';
      return '유지';
    },
    nextColor(k) {
      if (this.chosen[k]==='success') return 'var(--success)';
      if ((this.fails[k]||0)+1 >= 3) return 'var(--danger)';
      return 'var(--warn)';
    },
    summaryEmoji() {
      if (LIFTS.every(k=>this.chosen[k]==='success')) return '🏆';
      if (LIFTS.some(k=>this.chosen[k]==='fail'&&(this.fails[k]||0)+1>=3)) return '🔄';
      return '💪';
    },
    openSummary() {
      this.showSummary = true;
      this.$nextTick(() => lucide.createIcons());
    },
    finishWorkout() {
      const entry = {
        id: Date.now(), date: new Date().toISOString(),
        num: this.history.length + 1,
        weights: {...this.weights},
        tapped: {...this.tapped},
        results: {...this.chosen}
      };
      this.history.unshift(entry);

      LIFTS.forEach(k => {
        if (this.chosen[k]==='success') {
          const inc = k==='dead'?(this.deadBig?5:2.5):INC[k];
          this.weights[k] = this.round25(this.weights[k]+inc);
          this.fails[k] = 0;
        } else {
          const nf = (this.fails[k]||0)+1;
          if (nf >= 3) {
            this.weights[k] = this.round25(this.weights[k]*0.9);
            this.fails[k] = 0;
            if (k==='dead') this.deadBig = false;
          } else {
            this.fails[k] = nf;
            if (k==='dead') this.deadBig = false;
          }
        }
      });

      this.workoutActive = false;
      this.showSummary = false;
      this.chosen = { squat:null, bench:null, dead:null };
      this.tapped = { squat:0, bench:0, dead:0 };
      this.persist();

      const allOk = LIFTS.every(k=>entry.results[k]==='success');
      this.showToast(allOk ? '저장 완료! 다음 훈련도 파이팅 🏆' : '저장 완료. 다음엔 성공하자! 💪');
      this.$nextTick(() => lucide.createIcons());
    },

    // HISTORY
    delEntry(idx) {
      if (!confirm('삭제할까요?')) return;
      this.history.splice(idx,1);
      this.persist();
      this.showToast('삭제됐어요');
    },

    // STATS
    thisMonthCount() {
      const now = new Date();
      return this.history.filter(e => {
        const d = new Date(e.date);
        return d.getMonth()===now.getMonth() && d.getFullYear()===now.getFullYear();
      }).length;
    },
    successRate() {
      if (!this.history.length) return 0;
      return Math.round(this.history.filter(e=>LIFTS.every(k=>e.results[k]==='success')).length / this.history.length * 100);
    },
    prWeight(k) {
      let max = this.weights[k];
      this.history.forEach(e => { if (e.weights[k] && e.results[k]==='success' && e.weights[k]>max) max=e.weights[k]; });
      return max;
    },
    prDate(k) {
      let max = 0, date = null;
      this.history.forEach(e => { if (e.weights[k] && e.results[k]==='success' && e.weights[k]>max){ max=e.weights[k]; date=e.date; } });
      return date ? new Date(date).toLocaleDateString('ko-KR',{month:'short',day:'numeric'}) : '현재 무게';
    },

    // SETTINGS
    confirmReset() {
      if (confirm('정말 모든 기록을 초기화할까요?')) { localStorage.removeItem('fx5_v3'); location.reload(); }
    },

    // TOAST
    showToast(msg) {
      this.toastMsg = msg; this.toastVisible = true;
      setTimeout(() => { this.toastVisible = false; }, 2800);
    }
  };
}
</script>
</body>
</html>
